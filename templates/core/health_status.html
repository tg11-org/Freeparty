{% extends "base.html" %}
{% block title %}Service Status · Freeparty{% endblock %}
{% block content %}
<h2>Service Status</h2>
<p style="margin:0 0 1rem;color:var(--text2);">
  Overall: <strong style="color:{% if overall == 'ok' %}var(--accent){% else %}var(--danger){% endif %};">{{ overall|upper }}</strong>
</p>
<p style="margin:0 0 1rem;color:var(--text2);">
  This page intentionally shows only a general service summary. Detailed readiness diagnostics are restricted.
</p>
<div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
  <a class="btn" href="/health/live/">JSON live</a>
</div>
{% endblock %}
