# Freeparty Apache vhost template (Ubuntu 22.04 / Apache2)
# Target domain: freeparty.tg11.org
# Backend upstream: http://127.5.0.0:18000
#
# Enable modules first:
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite ssl socache_shmcb
#
# Then:
#   sudo cp deploy/apache/freeparty.site.conf /etc/apache2/sites-available/freeparty.conf
#   sudo a2ensite freeparty.conf
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName freeparty.tg11.org
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

    ErrorLog ${APACHE_LOG_DIR}/freeparty_http_error.log
    CustomLog ${APACHE_LOG_DIR}/freeparty_http_access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName freeparty.tg11.org

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/freeparty.tg11.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/freeparty.tg11.org/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off

    # Forward protocol/host so Django generates correct absolute URLs.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # WebSocket endpoint used by Channels notifications.
    ProxyPass        /ws/  ws://127.5.0.0:18000/ws/
    ProxyPassReverse /ws/  ws://127.5.0.0:18000/ws/

    # Everything else -> Daphne container exposed on host port 18000.
    ProxyPass        /     http://127.5.0.0:18000/
    ProxyPassReverse /     http://127.5.0.0:18000/

    ErrorLog ${APACHE_LOG_DIR}/freeparty_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/freeparty_ssl_access.log combined
</VirtualHost>
</IfModule>
