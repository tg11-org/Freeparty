name: CI

on:
  push:
  pull_request:

jobs:
  django-tests:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DEBUG: "False"
      SECRET_KEY: ci-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:8000
      CSRF_TRUSTED_ORIGINS: http://localhost:8000
      SITE_SCHEME: http
      SITE_DOMAIN: testserver
      DATABASE_URL: sqlite:///test.sqlite3
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check for model drift
        run: python manage.py makemigrations --check --dry-run
      - name: Django system checks
        run: python manage.py check
      - name: Run test suite
        run: python manage.py test apps.accounts apps.actors apps.core apps.moderation apps.notifications apps.posts apps.private_messages apps.profiles apps.social

  browser-smoke:
    runs-on: ubuntu-latest
    needs: django-tests
    env:
      PLAYWRIGHT_RUN_SMOKE: "1"
      DJANGO_SETTINGS_MODULE: config.settings.development
      DEBUG: "False"
      SECRET_KEY: ci-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:8000
      CSRF_TRUSTED_ORIGINS: http://localhost:8000
      SITE_SCHEME: http
      SITE_DOMAIN: testserver
      DATABASE_URL: sqlite:///test.sqlite3
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: python manage.py test apps.core.test_browser_smoke
