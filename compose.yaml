services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BIND_IP:-127.0.0.1}:${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./:/app

  db:
    image: postgres:16.3
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freeparty}
      POSTGRES_USER: ${POSTGRES_USER:-freeparty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freeparty}
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./:/app

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "celery -A config beat -l info -s \"$${CELERY_BEAT_SCHEDULE_FILENAME:-/tmp/celerybeat-schedule}\""]
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./:/app

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:${SMTP_PORT:-1025}:1025"
      - "${BIND_IP:-127.0.0.1}:${MAILHOG_UI_PORT:-8025}:8025"
    environment:
      MH_HOSTNAME: mailhog

volumes:
  postgres_data:
