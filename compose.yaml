services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BIND_IP:-127.0.0.1}:${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: freeparty
      POSTGRES_USER: freeparty
      POSTGRES_PASSWORD: freeparty
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config beat -l info
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:${SMTP_PORT:-1025}:1025"
      - "${BIND_IP:-127.0.0.1}:${MAILHOG_UI_PORT:-8025}:8025"
    environment:
      MH_HOSTNAME: mailhog

volumes:
  postgres_data:
