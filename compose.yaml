services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: freeparty
      POSTGRES_USER: freeparty
      POSTGRES_PASSWORD: freeparty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config beat -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

volumes:
  postgres_data:
